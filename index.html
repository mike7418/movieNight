<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Night</title>
    <script src="https://kit.fontawesome.com/11bec134ab.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="assets/stylesheets/index.css">
    <link rel="stylesheet" href="assets/stylesheets/movienight.css">
    <script src="assets/javascripts/index.js"></script>
</head>
<body>
    <section>
        <nav>
            <div class="nav__container">
                <img src="assets/images/1000_F_1857308472_esgZtxD24CWg1pbbqxbToE8Ly7qHIxzj.webp" / class="logo">
                <ul class="nav__links">
                    <li>
                        <a href="index.html" class="nav__link">Home</a>
                    </li>
                    <li>
                        <a href="#" class="nav__link">Contact</a>
                    </li>
                    <li>
                        <a href="#" class="nav__link">About Us</a>
                    </li>
                    <li>
                        <a href="#" class="nav__link nav__link--primary">Movies</a>
                    </li>
                </ul>
                <button class="btn__menu" onclick="openMenu()">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="menu__backdrop">
                    <button class="btn__menu btn__menu--close" onclick="closeMenu()">
                        <i class="fas fa-times"></i>
                    </button>
                    <ul class="menu__links">
                        <li class="menu__list">
                            <a href="index.html" class="menu__link" onclick="closeMenu()">Home</a>
                        </li>
                        <li class="menu__list">
                            <a href="" class="menu__link" onclick="closeMenu()">About Us</a>
                        </li>
                        <li class="menu__list">
                            <a href="" class="menu__link" onclick="closeMenu()">Contact</a>
                        </li>
                        <li class="menu__list">
                            <a href="" class="menu__link" onclick="closeMenu()">Movies</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </section>
    <main>
        <section id="introduction">
            <h2>
                Welcome to <span class="accent__text">Movie Night</span>
            </h2>
            <h3>Your complete movie database</h3>
            <h2>Movie Search</h2>

            <form id="searchForm">
                <input type="text" id="title" placeholder="Movie Title" required />
                <input type="text" id="year" placeholder="Year (optional)" />
                <button type="submit" class="btn">Search</button>
            </form>
        </section>
        <section id="movies">


            <div id="results" class="grid"></div>
            <div id="pagination"></div>


            <script src="assets/javascripts/movieNight.js"></script>
        </section>
    </main>

</body>
</html>
