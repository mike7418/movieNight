<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --card-bg: #12121a;
      --accent: #e8c84a;
      --accent2: #ff6b35;
      --text: #f0ede6;
      --muted: #7a7a8a;
      --border: rgba(232,200,74,0.15);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      padding: 2rem;
      overflow: hidden;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #e8c84a, transparent 70%);
      top: -200px; left: -200px;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #ff6b35, transparent 70%);
      bottom: -150px; right: -150px;
    }

    /* Loading state */
    #loading {
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: min(780px, 100%);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      display: grid;
      grid-template-columns: 260px 1fr;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(232,200,74,0.05),
        0 40px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(232,200,74,0.05);
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .card.visible { opacity: 1; transform: translateY(0); }

    /* Poster */
    .poster-wrap {
      position: relative;
      overflow: hidden;
    }
    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(0.85);
      transition: filter 0.5s ease, transform 0.5s ease;
    }
    .card:hover .poster-wrap img {
      filter: saturate(1.1);
      transform: scale(1.03);
    }
    .poster-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 60%, var(--card-bg) 100%);
    }

    /* Badge */
    .rating-badge {
      position: absolute;
      top: 16px; left: 16px;
      background: var(--accent);
      color: #0a0a0f;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      padding: 4px 10px;
      border-radius: 2px;
      z-index: 2;
    }

    /* Content */
    .content {
      padding: 2rem 2rem 2rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .meta-top {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 2px 8px;
      border-radius: 2px;
      font-weight: 500;
    }
    .year {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--text);
      line-height: 1;
      letter-spacing: 0.04em;
    }

    .director {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .director span { color: var(--text); font-weight: 500; }

    .divider {
      height: 1px;
      background: var(--border);
    }

    .plot {
      font-size: 0.88rem;
      color: #b0adb8;
      line-height: 1.7;
      font-weight: 300;
    }

    /* Ratings row */
    .ratings {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }
    .rating-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .rating-source {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
    .rating-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      line-height: 1;
    }

    /* Details grid */
    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 1rem;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .detail-label {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--muted);
    }
    .detail-value {
      font-size: 0.8rem;
      color: var(--text);
      font-weight: 400;
    }

    /* Footer strip */
    .card-footer {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.2);
    }
    .awards {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
    }
    .awards strong { color: var(--accent2); font-style: normal; }
    .imdb-link {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .imdb-link:hover { color: #fff; border-color: #fff; }

    /* Error state */
    .error {
      color: #ff6b6b;
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
    }

    @media (max-width: 560px) {
      .card { grid-template-columns: 1fr; }
      .poster-wrap { height: 320px; }
      .poster-wrap::after { background: linear-gradient(to top, var(--card-bg) 0%, transparent 60%); }
    }
  </style>
</head>
<body>

  <div id="loading">Fetching movie data…</div>

  <script>
    const API_URL = "https://www.omdbapi.com/?apikey=fbd4261d";

   async function fetchMovie(imdbID) {
        const loading = document.getElementById("loading");
        try {
            const res = await fetch(`${API_URL}&i=${imdbID}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const movie = await res.json();
            if (movie.Response === "False") throw new Error(movie.Error);
            renderCard(movie);
        } catch (err) {
            loading.innerHTML = `<div class="error">⚠️ Could not load movie: ${err.message}</div>`;
        }
    }

    function renderCard(m) {
      const loading = document.getElementById("loading");
      loading.remove();

      const genres = (m.Genre || "").split(", ");
      const ratingMap = {
        "Internet Movie Database": "IMDb",
        "Rotten Tomatoes": "Tomatoes",
        "Metacritic": "Metacritic"
      };

      const tagsHtml = genres.map(g => `<span class="tag">${g}</span>`).join("");
      const ratingsHtml = (m.Ratings || []).map(r => `
        <div class="rating-item">
          <span class="rating-source">${ratingMap[r.Source] || r.Source}</span>
          <span class="rating-value">${r.Value}</span>
        </div>
      `).join("");

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="poster-wrap">
          <div class="rating-badge">★ ${m.imdbRating}</div>
          <img src="${m.Poster}" onerror="this.src='assets/images/000000H1.jpg'"
               alt="${m.Title} poster" loading="lazy"/>
        </div>

        <div class="content">
          <div class="meta-top">
            ${tagsHtml}
            <span class="year">${m.Year} · ${m.Runtime} · ${m.Rated}</span>
          </div>
          <h1>${m.Title}</h1>
          <div class="director">Directed by <span>${m.Director}</span></div>
          <div class="divider"></div>
          <p class="plot">${m.Plot}</p>
          <div class="ratings">${ratingsHtml}</div>
          <div class="divider"></div>
          <div class="details">
            <div class="detail-item">
              <span class="detail-label">Actors</span>
              <span class="detail-value">${m.Actors}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Box Office</span>
              <span class="detail-value">${m.BoxOffice !== "N/A" ? m.BoxOffice : "—"}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Language</span>
              <span class="detail-value">${m.Language}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Released</span>
              <span class="detail-value">${m.Released}</span>
            </div>
          </div>
        </div>

        <div class="card-footer">
          <span class="awards"><strong>🏆</strong> ${m.Awards}</span>
          <a class="imdb-link" href="https://www.imdb.com/title/${m.imdbID}" target="_blank" rel="noopener">
            View on IMDb ↗
          </a>
        </div>
      `;

      document.body.appendChild(card);
      // Trigger enter animation
      requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add("visible")));
    }

    function getImdbIDFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get("imdbID");
    }

    const imdbID = getImdbIDFromURL();

    if (imdbID) {
        fetchMovie(imdbID);
    } else {
        document.getElementById("loading").innerHTML =
            `<div class="error">⚠️ No IMDb ID provided in URL</div>`;
    }

  </script>
</body>
</html>
