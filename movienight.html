<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Search</title>
    <link rel="stylesheet" href="assets/stylesheets/movienight.css">
</head>
<body>

    <h1>Movie Search</h1>

    <form id="searchForm">
        <input type="text" id="title" placeholder="Movie Title" required />
        <input type="text" id="year" placeholder="Year (optional)" />
        <button type="submit">Search</button>
    </form>

    <div id="results" class="grid"></div>
    <div id="pagination"></div>

    <script src="assets/javascripts/movieNight.js"></script>
</body>
</html>
